<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Penny's Independent Work</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:       #E8608A;
    --pink-mid:   #D45480;
    --pink-light: #F9D0DF;
    --green:      #A9DFBF;
    --blue:       #AED6F1;
    --yellow:     #F9E79F;
    --lavender:   #D2B4DE;
    --teal:       #A3E4D7;
    --peach:      #F5CBA7;
    --cream:      #FFF5F8;
    --light:      #FCE8EF;
    --mid:        #B87A90;
    --dark:       #3B1F2B;
    --white:      #FFFFFF;
    --grey:       #D0D0D0;
    --shadow:     0 4px 20px rgba(180,80,120,0.10);
    --radius:     18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; padding-bottom: 60px; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-mid) 100%);
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
  }
  .header h1 { font-family: 'Fredoka One', cursive; font-size: 1.7rem; color: #fff; letter-spacing: 0.02em; line-height: 1.2; }
  .header .date-badge {
    display: inline-block; background: rgba(255,255,255,0.22); color: #fff;
    font-weight: 800; font-size: 0.78rem; padding: 5px 16px; border-radius: 20px; margin-top: 10px;
  }
  .parent-btn {
    position: absolute; top: 20px; right: 16px;
    background: rgba(255,255,255,0.18); color: #fff; border: none; border-radius: 10px;
    padding: 8px 14px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.78rem; cursor: pointer;
  }

  /* DAY TABS */
  .day-tabs { display: flex; gap: 8px; padding: 16px 16px 0; overflow-x: auto; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0; background: var(--white); border: 2px solid var(--light);
    border-radius: 14px; padding: 10px 16px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.85rem; color: var(--mid); cursor: pointer; transition: all 0.2s; position: relative;
  }
  .day-tab.active { background: var(--pink); border-color: var(--pink); color: #fff; }
  .day-tab .day-count {
    position: absolute; top: -6px; right: -6px; background: var(--green); color: var(--dark);
    font-size: 0.65rem; font-weight: 800; width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* PROGRESS */
  .progress-wrap { padding: 14px 16px 0; }
  .progress-label { font-size: 0.78rem; font-weight: 700; color: var(--mid); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-bar { background: var(--light); border-radius: 10px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink-light), var(--pink)); border-radius: 10px; transition: width 0.4s ease; }

  /* TASKS */
  .tasks-wrap { padding: 14px 16px; }
  .task-card { background: var(--white); border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; transition: transform 0.15s; }
  .task-card.done { opacity: 0.7; }
  .task-main { display: flex; align-items: center; gap: 14px; padding: 16px; }
  .task-check {
    width: 46px; height: 46px; border-radius: 50%; border: 3px solid var(--light);
    background: var(--cream); display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .task-check.checked { background: var(--green); border-color: var(--green); }
  .task-info { flex: 1; min-width: 0; }
  .task-name { font-weight: 800; font-size: 1rem; color: var(--dark); line-height: 1.3; }
  .task-card.done .task-name { text-decoration: line-through; color: var(--mid); }
  .task-instruction { font-size: 0.78rem; color: var(--mid); margin-top: 3px; font-weight: 600; }
  .task-color-bar { width: 6px; align-self: stretch; flex-shrink: 0; border-radius: 0 var(--radius) var(--radius) 0; }
  .play-btn {
    width: 46px; height: 46px; border-radius: 50%; background: var(--pink); border: none;
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  }

  /* VIDEO */
  .video-wrap { display: none; padding: 0 16px 16px; }
  .video-wrap.open { display: block; }
  .video-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; background: #000; }
  .video-wrap iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; }
  .video-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 30%; background: #000; pointer-events: none; z-index: 2; }
  .video-overlay-top { position: absolute; top: 0; right: 0; width: 40%; height: 20%; background: #000; pointer-events: none; z-index: 2; }
  .video-close { display: block; text-align: center; font-size: 0.75rem; font-weight: 700; color: var(--mid); margin-top: 8px; cursor: pointer; padding: 4px; }

  /* DONE BANNER */
  .done-banner { display: none; margin: 0 16px 16px; background: linear-gradient(135deg, var(--green), var(--blue)); border-radius: var(--radius); padding: 20px; text-align: center; }
  .done-banner.show { display: block; }
  .done-banner p { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--dark); margin-top: 6px; }

  /* HISTORY */
  .section-title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--pink-mid); padding: 8px 16px 10px; }
  .history-wrap { padding: 0 16px; }
  .history-week { background: var(--white); border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .history-week-header { background: var(--pink); color: #fff; font-family: 'Fredoka One', cursive; font-size: 0.9rem; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 0.68rem; }
  .history-table th { background: var(--light); color: var(--mid); font-weight: 800; padding: 7px 4px; text-align: center; border-bottom: 1px solid var(--light); }
  .history-table th:first-child { text-align: left; padding-left: 12px; min-width: 90px; }
  .history-table td { padding: 7px 4px; text-align: center; border-bottom: 1px solid var(--light); color: var(--dark); }
  .history-table td:first-child { text-align: left; padding-left: 12px; font-weight: 700; font-size: 0.7rem; }
  .history-table tr:last-child td { border-bottom: none; }
  .tick-done { color: #27AE60; font-size: 1rem; }
  .tick-miss { color: #E0B0C0; font-size: 0.8rem; }
  .tick-off  { color: var(--grey); font-size: 0.8rem; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--cream); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--pink-mid); margin-bottom: 6px; }
  .modal .pin-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .modal input[type="password"], .modal input[type="text"], .modal input[type="number"] {
    flex: 1; border: 2px solid var(--light); border-radius: 12px; padding: 12px 14px;
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; background: var(--white); color: var(--dark); outline: none;
  }
  .modal input:focus { border-color: var(--pink); }
  .btn { background: var(--pink); color: #fff; border: none; border-radius: 14px; padding: 13px 22px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem; cursor: pointer; }
  .btn.secondary { background: var(--light); color: var(--pink-mid); }
  .btn.danger { background: #F1948A; color: #fff; }
  .btn.small { padding: 8px 14px; font-size: 0.78rem; }
  .task-editor { background: var(--white); border-radius: var(--radius); margin-bottom: 12px; padding: 14px; box-shadow: var(--shadow); }
  .task-editor .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .task-editor label { font-size: 0.72rem; font-weight: 800; color: var(--mid); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .task-editor .field { flex: 1; }
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s; }
  .color-dot.selected { border-color: var(--dark); }
  .day-checks { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .day-check-btn {
    padding: 5px 10px; border-radius: 8px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.72rem; cursor: pointer; border: 2px solid var(--light);
    background: var(--white); color: var(--mid); transition: all 0.15s;
  }
  .day-check-btn.on { background: var(--pink); border-color: var(--pink); color: #fff; }
  .add-task-btn { width: 100%; background: var(--pink-light); color: var(--pink-mid); border: none; border-radius: 14px; padding: 14px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem; cursor: pointer; margin-top: 4px; margin-bottom: 16px; }

  /* CONFETTI */
  .confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall 1.2s ease-in forwards; pointer-events: none; z-index: 999; }
  @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div class="header">
  <h1>Penny's Independent Work</h1>
  <div class="date-badge" id="dateBadge">Loading...</div>
  <button class="parent-btn" onclick="openParentModal()">Parent</button>
</div>

<div class="day-tabs" id="dayTabs"></div>
<div class="progress-wrap">
  <div class="progress-label"><span>Today's Progress</span><span id="progressText">0 / 0</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
<div class="tasks-wrap" id="tasksWrap"></div>
<div class="done-banner" id="doneBanner"><p>All done! Great work, Penny!</p></div>

<div class="section-title">This Week's History</div>
<div class="history-wrap" id="historyWrap"></div>

<!-- Parent Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Parent Settings</h2>
    <div id="pinSection">
      <p style="font-size:0.82rem;color:var(--mid);margin-bottom:12px;font-weight:600;">Enter PIN to edit tasks</p>
      <div class="pin-row">
        <input type="password" id="pinInput" placeholder="Enter PIN" maxlength="4">
        <button class="btn" onclick="checkPin()">Enter</button>
      </div>
      <p style="font-size:0.72rem;color:var(--mid);font-weight:600;">Default PIN: 1234</p>
    </div>
    <div id="editorSection" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <p style="font-size:0.82rem;font-weight:800;color:var(--pink-mid);">Edit Tasks</p>
        <button class="btn small secondary" onclick="changePinPrompt()">Change PIN</button>
      </div>
      <div id="changePinArea" style="display:none;background:var(--light);border-radius:12px;padding:12px;margin-bottom:12px;">
        <p style="font-size:0.72rem;font-weight:800;color:var(--mid);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em;">New PIN (4 digits)</p>
        <div style="display:flex;gap:8px;">
          <input type="number" id="newPinInput" placeholder="e.g. 5678" maxlength="4"
            style="flex:1;border:2px solid var(--light);border-radius:10px;padding:10px 12px;font-family:Nunito,sans-serif;font-size:0.9rem;background:#fff;color:var(--dark);outline:none;">
          <button class="btn small" onclick="saveNewPin()">Save</button>
        </div>
      </div>
      <p id="pinChangedMsg" style="display:none;font-size:0.78rem;font-weight:800;color:#27AE60;margin-bottom:10px;">PIN updated!</p>
      <div id="taskEditors"></div>
      <button class="add-task-btn" onclick="addTask()">+ Add New Task</button>
      <div style="display:flex;gap:10px;">
        <button class="btn" style="flex:1" onclick="saveTasks()">Save Changes</button>
        <button class="btn secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:2px solid var(--light);">
        <p style="font-size:0.75rem;font-weight:800;color:var(--mid);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;">History Export</p>
        <button class="btn secondary" style="width:100%" onclick="downloadHistory()">Download History as CSV</button>
      </div>
    </div>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const COLORS = ['F5CBA7','A9DFBF','AED6F1','F9E79F','F1948A','D2B4DE','A3E4D7','F2ECD8'];
const STORAGE_KEY = 'penny_work_v2';
const PIN_KEY = 'penny_pin_v1';

// Auto-detect today (0=Sun ... 6=Sat)
// Map JS day (0=Sun..6=Sat) to our order (0=Mon..6=Sun)
const dayMap = {1:0,2:1,3:2,4:3,5:4,6:5,0:6};
let currentDay = dayMap[new Date().getDay()];

function getWeekKey() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${now.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    tasks: [
      { id: 1, name: 'XtraMath',           instruction: '5 minutes — addition and subtraction', color: 'A9DFBF', videoId: '', days: [0,1,2,3,4,5,6] },
      { id: 2, name: 'Copywork',            instruction: 'Copy 2-3 sentences neatly',            color: 'AED6F1', videoId: '', days: [0,1,2,3,4] },
      { id: 3, name: 'Math Workbook',       instruction: 'Complete one page',                     color: 'A3E4D7', videoId: '', days: [0,1,2,3,4] },
      { id: 4, name: 'Nature Journal',      instruction: 'Draw or write what you observe outside',color: 'F9E79F', videoId: '', days: [2] },
      { id: 5, name: 'Handicraft Practice', instruction: 'Work on your current project',          color: 'D2B4DE', videoId: '', days: [0,1,2,3,4] },
      { id: 6, name: 'Chores',              instruction: 'Complete your chores for today',        color: 'F5CBA7', videoId: '', days: [0,1,2,3,4,5,6] },
    ],
    checks: {},
  };
}

let state = loadState();

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function getChecks() {
  const wk = getWeekKey();
  if (!state.checks[wk]) state.checks[wk] = {};
  return state.checks[wk];
}

function isChecked(taskId, dayIdx) { return !!getChecks()[`${taskId}-${dayIdx}`]; }

function isScheduled(task, dayIdx) {
  return !task.days || task.days.length === 0 || task.days.includes(dayIdx);
}

function toggleCheck(taskId, dayIdx) {
  const checks = getChecks();
  checks[`${taskId}-${dayIdx}`] = !checks[`${taskId}-${dayIdx}`];
  saveState();
  renderTasks();
  renderDayTabs();
  renderHistory();
  checkAllDone();
}

function updateDate() {
  const now = new Date();
  document.getElementById('dateBadge').textContent =
    now.toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

// ── DAY TABS ─────────────────────────────────────────────────────────────────
function renderDayTabs() {
  const wrap = document.getElementById('dayTabs');
  wrap.innerHTML = '';
  DAYS.forEach((day, idx) => {
    const scheduledTasks = state.tasks.filter(t => isScheduled(t, idx));
    const doneCount = scheduledTasks.filter(t => isChecked(t.id, idx)).length;
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (idx === currentDay ? ' active' : '');
    btn.innerHTML = day + (doneCount > 0 ? `<span class="day-count">${doneCount}</span>` : '');
    btn.onclick = () => { currentDay = idx; renderDayTabs(); renderTasks(); checkAllDone(); };
    wrap.appendChild(btn);
  });
}

// ── TASKS ─────────────────────────────────────────────────────────────────────
function renderTasks() {
  const wrap = document.getElementById('tasksWrap');
  wrap.innerHTML = '';
  const scheduledTasks = state.tasks.filter(t => isScheduled(t, currentDay));

  if (scheduledTasks.length === 0) {
    wrap.innerHTML = '<p style="color:var(--mid);font-size:0.9rem;font-weight:700;text-align:center;padding:24px 0;">No tasks scheduled today. Enjoy your free time!</p>';
    document.getElementById('progressText').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }

  const done = scheduledTasks.filter(t => isChecked(t.id, currentDay)).length;
  const total = scheduledTasks.length;
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;

  scheduledTasks.forEach(task => {
    const checked = isChecked(task.id, currentDay);
    const hasVideo = task.videoId && task.videoId.trim() !== '';
    const card = document.createElement('div');
    card.className = 'task-card' + (checked ? ' done' : '');
    card.innerHTML = `
      <div class="task-main">
        <button class="task-check ${checked ? 'checked' : ''}" onclick="toggleCheck(${task.id}, ${currentDay})">${checked ? '✓' : ''}</button>
        <div class="task-info">
          <div class="task-name">${task.name}</div>
          ${task.instruction ? `<div class="task-instruction">${task.instruction}</div>` : ''}
        </div>
        ${hasVideo ? `<button class="play-btn" onclick="toggleVideo(${task.id})">&#9654;</button>` : ''}
        <div class="task-color-bar" style="background:#${task.color}"></div>
      </div>
      ${hasVideo ? `
      <div class="video-wrap" id="video-${task.id}">
        <div class="video-container">
          <iframe src="https://www.youtube.com/embed/${task.videoId}?rel=0&modestbranding=1&playsinline=1&iv_load_policy=3&disablekb=1"
            allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            webkit-allowfullscreen playsinline></iframe>
          <div class="video-overlay"></div>
          <div class="video-overlay-top"></div>
        </div>
        <span class="video-close" onclick="toggleVideo(${task.id})">Close video</span>
      </div>` : ''}
    `;
    wrap.appendChild(card);
  });
}

function toggleVideo(taskId) {
  const vw = document.getElementById(`video-${taskId}`);
  if (!vw) return;
  const isOpen = vw.classList.contains('open');
  document.querySelectorAll('.video-wrap.open').forEach(v => {
    if (v !== vw) {
      v.classList.remove('open');
      const iframe = v.querySelector('iframe');
      if (iframe) { const s = iframe.src; iframe.src = ''; iframe.src = s; }
    }
  });
  if (!isOpen) vw.classList.add('open');
  else vw.classList.remove('open');
}

function checkAllDone() {
  const scheduledTasks = state.tasks.filter(t => isScheduled(t, currentDay));
  const done = scheduledTasks.filter(t => isChecked(t.id, currentDay)).length;
  const banner = document.getElementById('doneBanner');
  if (scheduledTasks.length > 0 && done === scheduledTasks.length) {
    banner.classList.add('show');
    launchConfetti();
  } else {
    banner.classList.remove('show');
  }
}

function launchConfetti() {
  const colors = ['#F5CBA7','#A9DFBF','#AED6F1','#F9E79F','#F1948A','#D2B4DE'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
      c.style.animationDelay = Math.random() * 0.4 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2000);
    }, i * 40);
  }
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory() {
  const wrap = document.getElementById('historyWrap');
  wrap.innerHTML = '';
  const wk = getWeekKey();
  const allWeeks = Object.keys(state.checks).sort().reverse();
  if (allWeeks.length === 0) {
    wrap.innerHTML = '<p style="color:var(--mid);font-size:0.82rem;padding:0 4px 16px;font-weight:600;">No history yet.</p>';
    return;
  }

  allWeeks.slice(0, 8).forEach(weekKey => {
    const checks = state.checks[weekKey] || {};
    const label = weekKey === wk ? 'This Week' : weekKey;
    const totalPossible = state.tasks.reduce((acc, t) => acc + t.days.length, 0);
    const doneCount = Object.values(checks).filter(Boolean).length;

    const block = document.createElement('div');
    block.className = 'history-week';
    block.innerHTML = `
      <div class="history-week-header">
        <span>${label}</span>
        <span>${doneCount} / ${totalPossible} completed</span>
      </div>
      <table class="history-table">
        <thead>
          <tr>
            <th>Task</th>
            ${DAYS.map(d => `<th>${d}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${state.tasks.map(task => `
            <tr>
              <td>${task.name}</td>
              ${DAYS.map((_, di) => {
                if (!isScheduled(task, di)) return '<td><span class="tick-off">—</span></td>';
                return checks[`${task.id}-${di}`]
                  ? '<td><span class="tick-done">✓</span></td>'
                  : '<td><span class="tick-miss">·</span></td>';
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    wrap.appendChild(block);
  });
}

// ── PARENT MODAL ──────────────────────────────────────────────────────────────
function openParentModal() {
  document.getElementById('pinSection').style.display = 'block';
  document.getElementById('editorSection').style.display = 'none';
  document.getElementById('pinInput').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function checkPin() {
  const entered = document.getElementById('pinInput').value;
  const stored = localStorage.getItem(PIN_KEY) || '1234';
  if (entered === stored) {
    document.getElementById('pinSection').style.display = 'none';
    document.getElementById('editorSection').style.display = 'block';
    renderTaskEditors();
  } else {
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').placeholder = 'Wrong PIN, try again';
    setTimeout(() => document.getElementById('pinInput').placeholder = 'Enter PIN', 2000);
  }
}

function changePinPrompt() {
  const el = document.getElementById('changePinArea');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function saveNewPin() {
  const val = document.getElementById('newPinInput').value.trim();
  if (/^\d{4}$/.test(val)) {
    localStorage.setItem(PIN_KEY, val);
    document.getElementById('newPinInput').value = '';
    document.getElementById('changePinArea').style.display = 'none';
    document.getElementById('pinChangedMsg').style.display = 'block';
    setTimeout(() => document.getElementById('pinChangedMsg').style.display = 'none', 2000);
  } else {
    document.getElementById('newPinInput').placeholder = 'Must be 4 digits';
  }
}

function renderTaskEditors() {
  const wrap = document.getElementById('taskEditors');
  wrap.innerHTML = '';
  state.tasks.forEach(task => {
    const div = document.createElement('div');
    div.className = 'task-editor';
    div.innerHTML = `
      <div class="row">
        <div class="field">
          <label>Task Name</label>
          <input type="text" value="${task.name}" id="ename-${task.id}" placeholder="Task name">
        </div>
        <button class="btn danger small" onclick="deleteTask(${task.id})" style="margin-top:18px;">Remove</button>
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>Instruction for Penny</label>
        <input type="text" value="${task.instruction}" id="einst-${task.id}" placeholder="e.g. Do 5 minutes">
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>YouTube Video ID (optional)</label>
        <input type="text" value="${task.videoId}" id="evid-${task.id}" placeholder="e.g. dQw4w9WgXcQ">
      </div>
      <div style="margin-bottom:8px;">
        <label>Which days?</label>
        <div class="day-checks" id="days-${task.id}">
          ${DAYS.map((d, di) => `
            <button type="button" class="day-check-btn ${task.days && task.days.includes(di) ? 'on' : ''}"
              onclick="toggleDayBtn(${task.id}, ${di}, this)">${d}</button>
          `).join('')}
        </div>
      </div>
      <div>
        <label>Color</label>
        <div class="color-picker">
          ${COLORS.map(c => `
            <div class="color-dot ${task.color === c ? 'selected' : ''}" style="background:#${c}"
              onclick="selectColor(${task.id}, '${c}', this)"></div>
          `).join('')}
        </div>
      </div>
    `;
    wrap.appendChild(div);
  });
}

function toggleDayBtn(taskId, dayIdx, el) {
  el.classList.toggle('on');
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!task.days) task.days = [];
  if (task.days.includes(dayIdx)) {
    task.days = task.days.filter(d => d !== dayIdx);
  } else {
    task.days.push(dayIdx);
    task.days.sort();
  }
}

function selectColor(taskId, color, el) {
  el.closest('.color-picker').querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  const task = state.tasks.find(t => t.id === taskId);
  if (task) task.color = color;
}

function addTask() {
  state.tasks.push({ id: Date.now(), name: 'New Task', instruction: '', color: 'A9DFBF', videoId: '', days: [1,2,3,4,5] });
  renderTaskEditors();
}

function deleteTask(taskId) {
  if (confirm('Remove this task?')) {
    state.tasks = state.tasks.filter(t => t.id !== taskId);
    renderTaskEditors();
  }
}

function saveTasks() {
  state.tasks.forEach(task => {
    const n = document.getElementById(`ename-${task.id}`);
    const i = document.getElementById(`einst-${task.id}`);
    const v = document.getElementById(`evid-${task.id}`);
    if (n) task.name = n.value.trim() || task.name;
    if (i) task.instruction = i.value.trim();
    if (v) task.videoId = v.value.trim();
  });
  saveState();
  closeModal();
  renderTasks();
  renderDayTabs();
  renderHistory();
}

// ── DOWNLOAD HISTORY ──────────────────────────────────────────────────────────
function downloadHistory() {
  const rows = [['Week','Task',...DAYS].join(',')];
  const allWeeks = Object.keys(state.checks).sort().reverse();
  if (allWeeks.length === 0) { alert('No history yet.'); return; }
  allWeeks.forEach(wk => {
    const checks = state.checks[wk] || {};
    state.tasks.forEach(task => {
      const dayCols = DAYS.map((_, di) => {
        if (!isScheduled(task, di)) return 'N/A';
        return checks[`${task.id}-${di}`] ? 'Done' : '';
      });
      rows.push([wk, `"${task.name}"`, ...dayCols].join(','));
    });
    rows.push('');
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'Penny_IndependentWork_History.csv'; a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('pinInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') checkPin(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
updateDate();
renderDayTabs();
renderTasks();
renderHistory();
checkAllDone();
</script>
</body>
</html>
